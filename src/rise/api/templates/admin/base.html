<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rise Admin{% block title %}{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; }
    #sidebar {
      min-width: 220px; max-width: 220px; min-height: 100vh;
      background: #1a1d21; position: sticky; top: 0; align-self: flex-start;
    }
    #sidebar .nav-link { color: #adb5bd; padding: .4rem .75rem; border-radius: 5px; }
    #sidebar .nav-link:hover { color: #fff; background: #2c3136; }
    #sidebar .nav-link.active { color: #fff; background: #0d6efd; }
    .main-content { padding: 1.75rem 2rem; min-width: 0; }
    .badge-queued     { background: #6c757d !important; }
    .badge-processing { background: #0d6efd !important; }
    .badge-retrying   { background: #fd7e14 !important; }
    .badge-completed, .badge-partially_completed { background: #198754 !important; }
    .badge-failed     { background: #dc3545 !important; }
    .badge-rejected   { background: #6f42c1 !important; }
    pre { background: #f1f3f5; border-radius: 6px; padding: 1rem; font-size: .8rem; max-height: 400px; overflow: auto; }
  </style>
</head>
<body>
<div class="d-flex" style="min-height:100vh">
  <nav id="sidebar" class="d-flex flex-column p-3">
    <a href="/admin/" class="text-white text-decoration-none mb-4 mt-1 d-flex align-items-center gap-2">
      <i class="bi bi-lightning-charge-fill text-warning fs-5"></i>
      <span class="fw-semibold fs-6">Rise Admin</span>
    </a>
    <ul class="nav nav-pills flex-column gap-1">
      <li><a href="/admin/" class="nav-link {% if active=='dashboard' %}active{% endif %}">
        <i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
      <li><a href="/admin/applications" class="nav-link {% if active=='applications' %}active{% endif %}">
        <i class="bi bi-list-ul me-2"></i>Applications</a></li>
      <li><a href="/admin/workers" class="nav-link {% if active=='workers' %}active{% endif %}">
        <i class="bi bi-robot me-2"></i>Workers</a></li>
      <li><a href="/admin/logs" class="nav-link {% if active=='logs' %}active{% endif %}">
        <i class="bi bi-journal-code me-2"></i>CloudWatch Logs</a></li>
    </ul>
    <hr class="border-secondary">
    <ul class="nav nav-pills flex-column gap-1">
      <li><a href="/docs" class="nav-link text-secondary">
        <i class="bi bi-code-slash me-2"></i>API Docs</a></li>
    </ul>
  </nav>
  <main class="main-content flex-grow-1">
    {% block content %}{% endblock %}
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
