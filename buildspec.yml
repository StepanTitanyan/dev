version: 0.2

env:
  variables:
    PYTHONPATH: src
  parameter-store:
    AWS_ACCOUNT_ID: /rise/AWS_ACCOUNT_ID
    AWS_REGION: /rise/AWS_REGION
    ECR_REPO: /rise/ECR_REPO
    ECS_CLUSTER: /rise/ECS_CLUSTER
    ECS_SERVICE_API: /rise/ECS_SERVICE_API
    ECS_SERVICE_WORKER: /rise/ECS_SERVICE_WORKER

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - pip install -r requirements.txt --quiet

  pre_build:
    commands:
      - echo "Running tests..."
      - python -m pytest tests/ -v --tb=short
      - echo "Tests passed. Logging in to ECR..."
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
      - IMAGE_TAG=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c1-8)
      - IMAGE_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPO

  build:
    commands:
      - echo "Building Docker image tag=$IMAGE_TAG..."
      - docker build -t $IMAGE_URI:$IMAGE_TAG -t $IMAGE_URI:latest .

  post_build:
    commands:
      - echo "Pushing image..."
      - docker push $IMAGE_URI:$IMAGE_TAG
      - docker push $IMAGE_URI:latest
      - echo "Registering task definitions..."
      - sed "s|IMAGE_PLACEHOLDER|$IMAGE_URI:latest|g" infra/task-def-api.json > task-def-api-rendered.json
      - sed "s|IMAGE_PLACEHOLDER|$IMAGE_URI:latest|g" infra/task-def-worker-prod.json > task-def-worker-rendered.json
      - API_TASK_DEF=$(aws ecs register-task-definition --cli-input-json file://task-def-api-rendered.json --region $AWS_REGION --query "taskDefinition.taskDefinitionArn" --output text)
      - WORKER_TASK_DEF=$(aws ecs register-task-definition --cli-input-json file://task-def-worker-rendered.json --region $AWS_REGION --query "taskDefinition.taskDefinitionArn" --output text)
      - echo "API task def $API_TASK_DEF"
      - echo "Worker task def $WORKER_TASK_DEF"
      - aws ecs update-service --cluster $ECS_CLUSTER --service $ECS_SERVICE_API --task-definition $API_TASK_DEF --force-new-deployment --region $AWS_REGION
      - aws ecs update-service --cluster $ECS_CLUSTER --service $ECS_SERVICE_WORKER --task-definition $WORKER_TASK_DEF --force-new-deployment --region $AWS_REGION
      - echo "Deploy triggered. ECS will pull the new image."
      - printf '[{"name":"rise-api","imageUri":"%s:latest"}]' "$IMAGE_URI" > imagedef.json

artifacts:
  files:
    - imagedef.json
  discard-paths: yes
